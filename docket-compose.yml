version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: raftar-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: raftar
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: raftar-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: raftar-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/raftar?authSource=admin
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/uploads:/app/uploads

  admin-dashboard:
    build: ./admin-dashboard
    container_name: raftar-admin
    restart: always
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:5000/api
    depends_on:
      - backend

volumes:
  mongodb_data:
  redis_data: